name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - '*-RELEASE'
  pull_request:
    branches:
      - main
  schedule:
    # Weekly rebuild of :main to pick up base image CVE patches (Mondays 18:00 UTC = 01:00 WIB Tue)
    - cron: '0 18 * * 1'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Manual tag (e.g. 2025.12-RELEASE or edge)'
        required: true
        default: 'edge'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      # Fork PRs cannot access secrets — build only, do not push.
      IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ env.IS_FORK_PR != 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.IS_FORK_PR != 'true' && secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/balaka
            ${{ secrets.DOCKERHUB_USERNAME != '' && 'artivisi/balaka' || '' }}
          # Tag matrix:
          #   Push to main           → :main, :main-<sha>
          #   Pull request           → :pr-<number>          (build only for fork PRs, push for same-repo PRs)
          #   Tag *-RELEASE          → :2025.12-RELEASE, :2025.12, :latest    (CalVer per docs/03-operations-guide.md)
          #   Patch *-RELEASE        → :2025.12.1-RELEASE, :2025.12.1, :2025.12, :latest
          #   Schedule (weekly cron) → :main (rebuilt with fresh base layers for CVE patches)
          #   workflow_dispatch      → user-supplied tag, default :edge
          tags: |
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=ref,event=tag
            type=match,pattern=(.*)-RELEASE,group=1
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') && endsWith(github.ref, '-RELEASE') }}
            type=raw,value=main,enable=${{ github.event_name == 'schedule' }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=Balaka
            org.opencontainers.image.description=Open-source accounting application for Indonesian SMEs
            org.opencontainers.image.vendor=PT Artivisi Intermedia
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          # Fork PRs build but do not push (no registry credentials available).
          push: ${{ env.IS_FORK_PR != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ env.IS_FORK_PR != 'true' }}
          sbom: ${{ env.IS_FORK_PR != 'true' }}

      - name: Generate artifact attestation (GHCR)
        if: ${{ env.IS_FORK_PR != 'true' && steps.build.outputs.digest != '' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/balaka
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
